services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: manus
      POSTGRES_PASSWORD: manus
      POSTGRES_DB: manus
    ports:
      - "5432:5432"
    volumes:
      - manus_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manus -d manus"]
      interval: 5s
      timeout: 5s
      retries: 5

  orchestrator:
    build:
      context: .
      dockerfile: docker/orchestrator.Dockerfile
    init: true
    stop_grace_period: 15s
    ports:
      - "4100:4100"
    environment:
      PORT: "4100"
      DATABASE_URL: postgresql://manus:manus@postgres:5432/manus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4100/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy

  realtime:
    build:
      context: .
      dockerfile: docker/realtime.Dockerfile
    init: true
    stop_grace_period: 15s
    ports:
      - "4102:4102"
    environment:
      PORT: "4102"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4102/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  browser-operator:
    build:
      context: .
      dockerfile: docker/browser-operator.Dockerfile
    init: true
    stop_grace_period: 15s
    ports:
      - "4101:4101"
    environment:
      PORT: "4101"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4101/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  skills-registry:
    build:
      context: .
      dockerfile: docker/skills-registry.Dockerfile
    init: true
    stop_grace_period: 15s
    ports:
      - "4103:4103"
    environment:
      PORT: "4103"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4103/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    init: true
    stop_grace_period: 15s
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_ORCHESTRATOR_URL: http://localhost:4100
      NEXT_PUBLIC_BROWSER_OPERATOR_URL: http://localhost:4101
      NEXT_PUBLIC_REALTIME_URL: ws://localhost:4102
      NEXT_PUBLIC_SKILLS_REGISTRY_URL: http://localhost:4103
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      orchestrator:
        condition: service_healthy
      realtime:
        condition: service_healthy
      browser-operator:
        condition: service_healthy
      skills-registry:
        condition: service_healthy

volumes:
  manus_pgdata: {}
